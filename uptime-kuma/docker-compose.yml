services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./data/kuma-data:/app/data
    networks:
      dockitt_network:
        ipv4_address: 10.0.0.70
    dns:
      - 10.0.0.5

networks:
  dockitt_network:
    external: true
