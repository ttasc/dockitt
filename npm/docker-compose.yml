services:
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: npm
    restart: unless-stopped

    ports:
      - '80:80'
      - '443:443'
      - '81:81'

    environment:
      TZ: "Asia/Ho_Chi_Minh"

    volumes:
      - ./data/data:/data
      - ./data/letsencrypt:/etc/letsencrypt

    networks:
      dockitt_network:
        ipv4_address: 10.0.0.10

networks:
  dockitt_network:
    external: true
